exclude: |
    ^fund/|
    ^assets/vendor/|
    ^node_modules/|
    ^venv/|
    ^.mypy_cache/|
    ^.ruff_cache/|
    ^coverage/|
    ^dist/|
    ^build/

repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: end-of-file-fixer
            # Do not touch generated data CSVs
            exclude: ^data/.*\.csv$
          - id: trailing-whitespace
            # Do not touch generated data CSVs
            exclude: ^data/.*\.csv$
          - id: mixed-line-ending
            # Do not touch generated data CSVs
            exclude: ^data/.*\.csv$
          - id: detect-private-key

    - repo: https://github.com/igorshubovych/markdownlint-cli
      rev: v0.41.0
      hooks:
          - id: markdownlint
            args: ['--config', '.markdownlint.json']

    # JavaScript tooling (commit): format + lint
    - repo: local
      hooks:
          - id: prettier
            name: prettier (staged files)
            entry: ./scripts/run-npx.sh -y -p prettier@3.8.1 prettier --write --config .prettierrc.cjs --ignore-path .prettierignore --
            language: system
            files: '\\.(js|css|json|yml|yaml|md|html)$'
            pass_filenames: true
            stages: [pre-commit, manual]

    - repo: local
      hooks:
          - id: eslint
            name: eslint (staged JS)
            entry: ./scripts/run-npx.sh -y -p eslint@9.17.0 eslint --config eslint.config.cjs --max-warnings=0 --no-warn-ignored --
            language: system
            types_or: [javascript]
            pass_filenames: true
            stages: [pre-commit, manual]

    - repo: local
      hooks:
          - id: stylelint
            name: stylelint (staged CSS)
            entry: ./scripts/run-npx.sh -y -p stylelint@16.22.0 -p @stylistic/stylelint-plugin@4.0.0 stylelint --formatter=unix --config-basedir . --
            language: system
            types_or: [css]
            pass_filenames: true
            stages: [pre-commit, manual]

    # JS tests (commit): related tests only
    - repo: local
      hooks:
          - id: jest-related
            name: jest (related tests)
            entry: ./scripts/run-npx.sh -y jest --findRelatedTests --passWithNoTests
            language: system
            types_or: [javascript]
            pass_filenames: true

    # Full test suites (push): JS + Python
    - repo: local
      hooks:
          - id: jest-full
            name: jest (full, pre-push)
            entry: ./scripts/run-npx.sh -y jest --ci --runInBand
            language: system
            pass_filenames: false
            stages: [pre-push]

    - repo: local
      hooks:
          - id: pytest-full
            name: pytest (full, pre-push)
            entry: bash -lc 'pytest -q'
            language: system
            pass_filenames: false
            stages: [pre-push]

    # Optional: mypy type check on commit (adjust paths as needed)
    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v1.10.0
      hooks:
          - id: mypy
            files: '^scripts/|^tests/python/'
